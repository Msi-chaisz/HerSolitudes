<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    min-height:100vh;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:#333;
    padding:20px;
}

.container{
    text-align:center;
    width:100%;
}

h1{
    font-size:2.8rem;
    font-weight:600;
    color:#ff4d8d;
    opacity:0;
    transform:translateY(30px);
    animation:fadeUp 1.2s ease forwards;
    position:relative;
    display:inline-block;
}

h1::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-8px;
    width:80%;
    height:3px;
    background:linear-gradient(to right,#ff4d8d,#ff9ab5);
    transform:translateX(-50%) scaleX(0);
    transform-origin:center;
    border-radius:10px;
    animation:underline 1s ease forwards;
    animation-delay:1.2s;
}

h1 span{
    color:#ff9ab5;
    font-weight:400;
}

h2{
    font-size:1.2rem;
    margin-top:20px;
    color:#888;
    letter-spacing:3px;
    opacity:0;
    animation:fadeIn 1s ease forwards;
    animation-delay:1.5s;
}

.typing{
    display:inline-block;
    border-right:2px solid #ff4d8d;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    animation:
        typing 2s steps(20) forwards,
        blink 0.7s infinite;
    animation-delay:2.5s;
}

@media (max-width:1024px){

    body{
        padding:30px;
    }

    h1{
        font-size:2.4rem;
    }

    h2{
        font-size:1.05rem;
        letter-spacing:2px;
    }

    h1::after{
        height:2px;
    }
}

@media (max-width:425px){

    body{
        padding:20px;
    }

    .container{
        width:100%;
    }

    h1{
        font-size:2rem;
        line-height:1.2;
    }

    h2{
        font-size:0.95rem;
        letter-spacing:1.5px;
        margin-top:15px;
    }

    h1::after{
        width:75%;
        bottom:-6px;
    }

    .typing{
        border-right:1.5px solid #ff4d8d;
    }
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fadeIn{
    to{
        opacity:1;
    }
}

@keyframes typing{
    from{ width:0; }
    to{ width:100%; }
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

@keyframes underline{
    from{
        transform:translateX(-50%) scaleX(0);
    }
    to{
        transform:translateX(-50%) scaleX(1);
    }
}

</style>
</head>

<body>

<div class="container">
    <h1>Her <span>Solitude</span></h1>
    <h2 class="typing">Welcome.</h2>
</div>

<!-- This Section is AI Generated -->
<script>
    setTimeout(() => {
        window.location.href = "Dashboard.html";
    }, 2500);
</script>

</body>
</html>
